name: Process Approval Decision

on:
  issues:
    types: [labeled]

jobs:
  handle-approval:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'approve' || github.event.label.name == 'reject'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract payload and form type from issue
        id: extract
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const body = context.payload.issue.body;
            const payloadMatch = body.match(/<!-- PAYLOAD:([A-Za-z0-9+/=]+) -->/);
            const formTypeMatch = body.match(/<!-- FORM_TYPE:([a-z-]+) -->/);
            if (!payloadMatch || !formTypeMatch) {
              core.setFailed('Could not extract payload or form type from issue');
              return;
            }
            const payload = JSON.parse(Buffer.from(payloadMatch[1], 'base64').toString('utf8'));
            const formType = formTypeMatch[1];
            core.setOutput('payload', JSON.stringify(payload));
            core.setOutput('form_type', formType);
            core.setOutput('issue_number', context.payload.issue.number);
            core.setOutput('decision', context.payload.label.name);

      - name: Publish submission
        if: steps.extract.outputs.decision == 'approve'
        env:
          PAYLOAD: ${{ steps.extract.outputs.payload }}
          FORM_TYPE: ${{ steps.extract.outputs.form_type }}
        run: |
          if [ "$FORM_TYPE" = "directory-submission" ]; then
            node .github/scripts/add-directory.js
          elif [ "$FORM_TYPE" = "markplaats-submission" ]; then
            node .github/scripts/add-markplaats.js
          elif [ "$FORM_TYPE" = "event-submission" ]; then
            node .github/scripts/add-event.js
          fi

      - name: Commit and push if approved
        if: steps.extract.outputs.decision == 'approve'
        run: |
          git config user.name "SAH Bot"
          git config user.email "bot@southafricanhub.nl"
          git add -A
          git diff --staged --quiet || git commit -m "Publish approved submission #${{ steps.extract.outputs.issue_number }}"
          git push

      - name: Close issue with result comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const decision = '${{ steps.extract.outputs.decision }}';
            const issueNumber = parseInt('${{ steps.extract.outputs.issue_number }}');
            const comment = decision === 'approve'
              ? '✅ **Published!** This submission has been added to the live site and Vercel is redeploying now.'
              : '❌ **Rejected.** This submission has been discarded and will not be published.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed',
            });
